server:
  port: 8761

spring:
  application:
    name: discovery-server

  zipkin:
    baseUrl: http://localhost:9411
  sleuth:
    probability: 1.0

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  username: ${EUREKA_USERNAME:user}
  password: ${EUREKA_PASSWORD:password}