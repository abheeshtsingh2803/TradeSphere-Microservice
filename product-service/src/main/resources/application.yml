server:
    port: 8080
spring:
  application:
    name: product-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/E-Commerce

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/