server:
    port: 0
spring:
  application:
    name: product-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/E-Commerce

  zipkin:
    baseUrl: http://localhost:9411
  sleuth:
    probability: 1.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

eureka:
  client:
    service-url:
      defaultZone: http://user:password@localhost:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans